overlay: 1.0.0
info:
  title: Overlay epilot schema to make a schema resource
  version: 0.0.1
actions:
  - target: $
    update:
      x-speakeasy-retries:
        strategy: backoff
        backoff:
          initialInterval: 5000 # 5 seconds
          maxInterval: 60000 # 60 seconds
          maxElapsedTime: 3600000 # 5 minutes
          exponent: 1.5
        statusCodes:
          - 5XX
        retryConnectionErrors: true
  # Environment Variables
  - target: $["paths"]["/v1/environments/{key}"]["get"]
    update:
      x-speakeasy-entity-operation: EnvironmentVariable#get
  - target: $["paths"]["/v1/environments"]["post"]
    update:
      x-speakeasy-entity-operation: EnvironmentVariable#create
  - target: $["paths"]["/v1/environments/{key}"]["put"]
    update:
      x-speakeasy-entity-operation: EnvironmentVariable#update
  - target: $["paths"]["/v1/environments/{key}"]["delete"]
    update:
      x-speakeasy-entity-operation: EnvironmentVariable#delete

  - target: $["components"]["schemas"]["EnvironmentVariable"]
    update:
      x-speakeasy-entity: EnvironmentVariable
    